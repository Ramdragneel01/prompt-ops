services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      PROMPT_OPS_DB_PATH: /app/data/prompt_ops.sqlite3
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    ports:
      - "8020:8020"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      PORT: 8100
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "8100:8100"
